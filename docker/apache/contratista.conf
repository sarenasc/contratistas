<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Redirige la raíz al login del sistema
    RedirectMatch ^/$ /contratista/public/login.php

    ErrorLog  ${APACHE_LOG_DIR}/contratista_error.log
    CustomLog ${APACHE_LOG_DIR}/contratista_access.log combined
</VirtualHost>
